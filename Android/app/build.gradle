The error is clear: settings.gradle is missing or doesn't have include ":app". Flutter shows "Type: malformed" and "Android package: null" because it can't find your Android project structure.

Complete Fix — Follow These Steps Exactly
Step 1: Go to Your GitHub Repo
Navigate to: github.com/patshahwaheguru-hash/MakePDF/android

Step 2: Check if settings.gradle Exists
If it doesn't exist, create it
If it exists, open it and check the content
Step 3: Create/Edit android/settings.gradle
The file must contain exactly this:

gradle
pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
}

include ":app"
The last line include ":app" is CRITICAL — without it, the build fails.

Step 4: Verify Your Folder Structure
Your repo must look like this:

MakePDF/
├── android/
│   ├── app/
│   │   ├── build.gradle
│   │   └── src/main/
│   │       ├── AndroidManifest.xml
│   │       └── kotlin/com/example/make_pdf/MainActivity.kt
│   ├── build.gradle
│   ├── settings.gradle          ← MUST EXIST with "include :app"
│   └── gradle.properties
├── lib/
│   ├── main.dart
│   └── MMain.dart
├── pubspec.yaml
└── codemagic.yaml
Step 5: Also Update android/app/build.gradle
Replace with:

gradle
plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.make_pdf"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.make_pdf"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}
